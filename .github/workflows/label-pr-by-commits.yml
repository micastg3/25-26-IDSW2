name: Validate PR Reto 002

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [reto-002]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate delivery
    steps:
      - name: Validate PR
        uses: actions/github-script@v7
        with:
          script: |
            // ── Configuración ──────────────────────────────────────
            const DEADLINE = new Date('2026-03-09T00:00:00+01:00');
            const REQUIRED_BRANCH = 'reto-002';
            const ALLOWED_PATHS = /^entregas\/[^/]+\/(README\.md|docs\/legibilidad\.md)$/;
            const STUDENT_ROOT  = /^entregas\/([^/]+)\//;

            // ── Obtener archivos del PR ────────────────────────────
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });

            const filePaths = files.map(f => f.filename);
            const errors = [];

            // ── 1. Rama destino ────────────────────────────────────
            const base = context.payload.pull_request.base.ref;
            if (base !== REQUIRED_BRANCH) {
              errors.push(`PR dirigido a \`${base}\`, debe ser \`${REQUIRED_BRANCH}\`.`);
            }

            // ── 2. Rutas válidas y carpeta única ───────────────────
            const students = new Set();
            const NAMING_CONVENTION = /^[a-záéíóúñü]+[A-ZÁÉÍÓÚÑÜ][a-záéíóúñü]+$/;

            for (const path of filePaths) {
              const rootMatch = path.match(STUDENT_ROOT);
              if (!rootMatch) {
                errors.push(`Archivo fuera de carpeta de entregas: \`${path}\``);
                continue;
              }
              students.add(rootMatch[1]);
              if (!ALLOWED_PATHS.test(path)) {
                errors.push(`Archivo no permitido en este reto: \`${path}\``);
              }
            }

            if (students.size > 1) {
              errors.push(`Archivos de múltiples carpetas: ${[...students].map(s => `\`${s}\``).join(', ')}`);
            }

            for (const name of students) {
              if (!NAMING_CONVENTION.test(name)) {
                errors.push(`Carpeta \`${name}\` no sigue la convención \`apellidoNombre\` (ej: \`masiasManuel\`).`);
              }
            }

            // ── 3. Artefactos obligatorios ─────────────────────────
            const hasReadme = filePaths.some(p => /^entregas\/[^/]+\/README\.md$/.test(p));
            const hasDocs   = filePaths.some(p => /^entregas\/[^/]+\/docs\/legibilidad\.md$/.test(p));

            if (!hasReadme) errors.push('Falta `README.md` en la carpeta de entregas.');
            if (!hasDocs)   errors.push('Falta `docs/legibilidad.md`.');

            // ── 4. Plazo ───────────────────────────────────────────
            const now = new Date();

            if (now > DEADLINE) {
              errors.push('Entrega fuera de plazo (límite: 8 mar 00:00 CET).');
            }

            // ── Etiquetas ──────────────────────────────────────────
            if (errors.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: ['entrega-incorrecta']
                });
              } catch (e) {
                console.log(`No se pudo añadir etiqueta: ${e.message}`);
              }
            }

            // Retirar etiqueta si ya no aplica
            const currentLabels = context.payload.pull_request.labels.map(l => l.name);
            if (errors.length === 0 && currentLabels.includes('entrega-incorrecta')) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: 'entrega-incorrecta'
                });
              } catch (e) {
                console.log(`No se pudo retirar etiqueta: ${e.message}`);
              }
            }

            // ── Comentario ─────────────────────────────────────────
            const student = [...students][0] || '—';
            let body = `## Validación de entrega — Reto 002\n\n`;
            body += `**Alumno:** \`${student}\` | **Archivos:** ${filePaths.length}\n\n`;

            if (errors.length === 0) {
              body += `✅ Entrega válida y dentro de plazo.\n`;
            } else {
              body += `### ❌ Errores (bloquean el merge)\n\n`;
              body += errors.map(e => `- ${e}`).join('\n') + '\n';
            }

            // Actualizar o crear comentario
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' &&
              c.body.includes('Validación de entrega — Reto 002')
            );

            const commentParams = {
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            if (existing) {
              await github.rest.issues.updateComment({
                ...commentParams,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                ...commentParams,
                issue_number: context.issue.number,
                body
              });
            }

            // ── Resultado ──────────────────────────────────────────
            if (errors.length > 0) {
              core.setFailed(`Entrega rechazada: ${errors.length} error(es).`);
            }
